<!doctype html>
<html lang="zh-Hant">
 <!-- (╯°Д°)╯ 幹嘛偷看我的語法！！！🐒 (╯°Д°)╯ -->

<head>
  <meta charset="utf-8" />
 <meta name="viewport"
       content="width=device-width,
                initial-scale=1,
                maximum-scale=1,
                user-scalable=no,
                viewport-fit=cover" />  
  <title>SUNNY🌞GRACE🌹ALLY🔫JESSICA🐸ANN🫐 ハッピーバースデー❗️</title>
  <link rel="stylesheet" href="./style.css" />
  <!-- info -->
  <meta name="description" content="ゲロゲロ！１５０歲生日大慶典開啟🐸" />
  
  <!-- Open Graph：FB / LINE / Slack -->
  <meta property="og:title" content="狂賀🎉150歲生日慶典｜HAPPY BIRTHDAY！" />
  <meta property="og:description" content="ゲロゲロ！１５０歲生日大慶典開啟🐸" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://eritung421-blip.github.io/HAPPYBIRTHDAY/" />
  <meta property="og:image" content="https://eritung421-blip.github.io/HAPPYBIRTHDAY/assets/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  
  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="狂賀🎉150歲生日慶典｜HAPPY BIRTHDAY！" />
  <meta name="twitter:description" content="ゲロゲロ！１５０歲生日大慶典開啟🐸" />
  <meta name="twitter:image" content="https://eritung421-blip.github.io/HAPPYBIRTHDAY/assets/preview.png" />
</head>
  
<body>
  <!-- 宇宙背景 -->
  <div class="bg" aria-hidden="true">
    <div class="nebula"></div>
    <div class="stars"></div>
    <canvas id="meteorCanvas"></canvas>
    <div class="vignette"></div>
  </div>

  <main class="wrap">
    <header class="hero">
      <div class="badge">狂賀🎉150歲生日慶典</div>
      <h1 class="title">HAPPY BIRTHDAY！<span class="spark">✨</span></h1>
      <p class="subtitle">\ㄍㄟ ㄌㄡ ㄍㄟ ㄌㄡ！ 祝二月三月ㄉ壽星生日快樂 🎵/ </p>
    </header>

    <section class="stage" aria-label="Birthday stage">
      <div class="panelGlow" aria-hidden="true"></div>

      <div class="cards" role="list" aria-label="Birthday cards">
        <!-- 5 張卡（直式 5:8） -->
        <button class="card" type="button" role="listitem" data-card="1" aria-label="生日卡片 1">
          <div class="cardFlip">
            <div class="cardFace cardFront">
              <div class="cardTop"><span class="tag">CARD 01</span><span class="rank">★</span></div>
              <img class="cardImg" src="./assets/card1.png" alt="卡片圖片 1" />
              <div class="cardBottom"><span class="hint">點我拆封</span><span class="chip">MISSION</span></div>
            </div>
            <div class="cardFace cardBack">
              <div class="backBadge">🎁 OPENED</div>
              <div class="backTitle">祝福訊息載入中…</div>
              <div class="backSub">請保持帥氣站姿</div>
              <div class="backSpark" aria-hidden="true"></div>
            </div>
          </div>
        </button>

        <button class="card" type="button" role="listitem" data-card="2" aria-label="生日卡片 2">
          <div class="cardFlip">
            <div class="cardFace cardFront">
              <div class="cardTop"><span class="tag">CARD 02</span><span class="rank">★★</span></div>
              <img class="cardImg" src="./assets/card2.png" alt="卡片圖片 2" />
              <div class="cardBottom"><span class="hint">點我拆封</span><span class="chip">MISSION</span></div>
            </div>
            <div class="cardFace cardBack">
              <div class="backBadge">🎁 OPENED</div>
              <div class="backTitle">祝福訊息載入中…</div>
              <div class="backSub">請保持帥氣站姿</div>
              <div class="backSpark" aria-hidden="true"></div>
            </div>
          </div>
        </button>

        <button class="card" type="button" role="listitem" data-card="3" aria-label="生日卡片 3">
          <div class="cardFlip">
            <div class="cardFace cardFront">
              <div class="cardTop"><span class="tag">CARD 03</span><span class="rank">★★★</span></div>
              <img class="cardImg" src="./assets/card3.png" alt="卡片圖片 3" />
              <div class="cardBottom"><span class="hint">點我拆封</span><span class="chip">MISSION</span></div>
            </div>
            <div class="cardFace cardBack">
              <div class="backBadge">🎁 OPENED</div>
              <div class="backTitle">祝福訊息載入中…</div>
              <div class="backSub">請保持帥氣站姿</div>
              <div class="backSpark" aria-hidden="true"></div>
            </div>
          </div>
        </button>

        <button class="card" type="button" role="listitem" data-card="4" aria-label="生日卡片 4">
          <div class="cardFlip">
            <div class="cardFace cardFront">
              <div class="cardTop"><span class="tag">CARD 04</span><span class="rank">★★★★</span></div>
              <img class="cardImg" src="./assets/card4.png" alt="卡片圖片 4" />
              <div class="cardBottom"><span class="hint">點我拆封</span><span class="chip">MISSION</span></div>
            </div>
            <div class="cardFace cardBack">
              <div class="backBadge">🎁 OPENED</div>
              <div class="backTitle">祝福訊息載入中…</div>
              <div class="backSub">請保持帥氣站姿</div>
              <div class="backSpark" aria-hidden="true"></div>
            </div>
          </div>
        </button>

        <button class="card" type="button" role="listitem" data-card="5" aria-label="生日卡片 5">
          <div class="cardFlip">
            <div class="cardFace cardFront">
              <div class="cardTop"><span class="tag">CARD 05</span><span class="rank">★★★★★</span></div>
              <img class="cardImg" src="./assets/card5.png" alt="卡片圖片 5" />
              <div class="cardBottom"><span class="hint">點我拆封</span><span class="chip">MISSION</span></div>
            </div>
            <div class="cardFace cardBack">
              <div class="backBadge">🎁 OPENED</div>
              <div class="backTitle">祝福訊息載入中…</div>
              <div class="backSub">請保持帥氣站姿</div>
              <div class="backSpark" aria-hidden="true"></div>
            </div>
          </div>
        </button>
      </div>

    </section>
  </main>

      <!-- 進站圖片 Popup -->
    <div class="popup" id="entryPopup" aria-hidden="true">
      <div class="popupOverlay"></div>
    
      <div class="popupBox" role="dialog" aria-modal="true" aria-label="進站提示">
        <button class="popupClose" id="popupCloseBtn" type="button" aria-label="關閉">✕</button>
        <canvas class="confettiCanvas" id="confettiCanvas"></canvas>
        <img class="popupImg" src="./assets/preview.png" alt="Popup 圖片" />
      </div>
    </div>

  <!-- 祝福彈窗 -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modalOverlay" data-close="1"></div>

    <div class="modalBox" role="document">
      <div class="modalTop">
        <div class="modalTitle" id="modalTitle">🚀 祝福訊息傳入</div>
        <button class="iconBtn" type="button" data-close="1" aria-label="關閉">✕</button>
      </div>

      <div class="modalBody">
        <div class="msgShell">
          <button class="navBtn" id="btnPrev" type="button" aria-label="上一句">←</button>

          <div class="msgBubble glowMessage">
            <div class="msgFrom">宇宙司令部祝福：</div>
            <div class="msgText" id="msgText"></div>
            <div class="fromLine" id="fromLine"></div>

            <div class="metaRow">
              <span class="chip2" id="pickedCardChip">Card #</span>
              <span class="chip2" id="pickedMsgChip">Message #</span>
            </div>
          </div>

          <button class="navBtn" id="btnNext" type="button" aria-label="下一句">→</button>
        </div>
      </div>

      <div class="modalActions">
        <button class="btn" id="btnRandom" type="button">隨機一則 🎲</button>
        <button class="btn primary" id="btnCopy" type="button">複製祝福 📋</button>
      </div>

      <div class="kbdHint">支援鍵盤：← → 切換、ESC 關閉</div>
    </div>
  </div>
  <!-- 幹嘛偷看我的語法！！！🐒 -->
  <script src="./script.js"></script>
</body>
</html>
